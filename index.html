<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voided Studios Application Portal</title>

<style>
body{
margin:0;
font-family:monospace;
background:#0b0b10;
color:white;
}

header{
padding:15px;
border-bottom:1px solid #222;
}

.container{
display:grid;
grid-template-columns:1fr 340px;
height:calc(100vh - 60px);
}

.left{
padding:20px;
overflow-y:auto;
}

.right{
border-left:1px solid #222;
padding:15px;
overflow-y:auto;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
background:#050507;
border:1px solid #333;
color:white;
border-radius:6px;
font-family:monospace;
}

textarea{
height:120px;
resize:none;
}

button{
background:#7c3aed;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
margin:5px 0;
}

.app{
background:#0f0f14;
border:1px solid #222;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.small{
font-size:12px;
color:#888;
}

.row{
margin:4px 0;
}
</style>
</head>

<body>

<header>
<h2>Voided Studios Application Portal</h2>
</header>

<div class="container">

<!-- LEFT FORM -->
<div class="left">

<div class="card">
<h3>Apply to Voided Studios</h3>

<input id="roblox" placeholder="Roblox Username">
<input id="realname" placeholder="Real Name">
<input id="discord" placeholder="Discord Username">
<input id="xname" placeholder="X Username (Twitter)">
<input id="email" placeholder="Email Address">

<select id="role">

<!-- CORE ENGINEERING -->
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
<option>Software Engineer</option>
<option>Game Developer</option>
<option>Gameplay Programmer</option>
<option>Systems Programmer</option>
<option>Tools Programmer</option>
<option>Engine Programmer</option>
<option>Graphics Programmer</option>
<option>AI Engineer</option>
<option>Machine Learning Engineer</option>
<option>DevOps Engineer</option>
<option>Site Reliability Engineer</option>
<option>Cloud Engineer</option>
<option>Infrastructure Engineer</option>
<option>Security Engineer</option>
<option>Network Engineer</option>
<option>Database Engineer</option>
<option>Performance Engineer</option>
<option>Automation Engineer</option>

<!-- ROBLOX -->
<option>Roblox Scripter</option>
<option>Roblox Gameplay Developer</option>
<option>Roblox Systems Engineer</option>
<option>Roblox UI Engineer</option>

<!-- UI / UX -->
<option>UI Developer</option>
<option>UX Engineer</option>
<option>UI/UX Designer</option>

<!-- ART -->
<option>3D Modeler</option>
<option>Animator</option>
<option>VFX Artist</option>
<option>Concept Artist</option>

<!-- DESIGN -->
<option>Game Designer</option>
<option>Level Designer</option>

<!-- AUDIO -->
<option>Sound Designer</option>
<option>Music Composer</option>

<!-- QA -->
<option>QA Tester</option>
<option>Community Manager</option>

<!-- LEADERSHIP -->
<option>Development Director</option>
<option>Executive Development Director</option>

</select>

<textarea id="reason" placeholder="Why do you want to join Voided Studios?"></textarea>
<textarea id="extra" placeholder="What can you bring to the team?"></textarea>

<button onclick="submitApp()">Submit Application</button>

</div>

</div>

<!-- RIGHT ADMIN -->
<div class="right">

<h3>Admin Panel</h3>

<input id="pass" type="password" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="apps"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCic_ne2ZWsYZeTFX-2fJPCcFXJlqzLEW4",
authDomain: "voided-studios-apply-portal.firebaseapp.com",
projectId: "voided-studios-apply-portal",
storageBucket: "voided-studios-apply-portal.firebasestorage.app",
messagingSenderId: "385790292991",
appId: "1:385790292991:web:a4a10cb5781c107151adca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "applications");

const PASSWORD = "VoidedStudios.Agent";
let loggedIn = false;
let apps = [];

const appsDiv = document.getElementById("apps");

/* LIVE DATA */
onSnapshot(colRef, (snap)=>{
apps = snap.docs.map(d => ({id:d.id, ...d.data()}));
render();
});

/* SUBMIT */
async function submitApp(){

const data = {
roblox: roblox.value,
realname: realname.value,
discord: discord.value,
x: xname.value,
email: email.value,
role: role.value,
reason: reason.value,
extra: extra.value,
time: new Date().toLocaleString(),
status:"Pending"
};

await addDoc(colRef, data);

alert("Submitted!");
}

/* LOGIN */
function login(){
if(pass.value === PASSWORD){
loggedIn = true;
render();
}else{
alert("Wrong password");
}
}

/* MAILTO EMAIL TEMPLATE */
function sendEmail(app){

const subject = `Voided Studios Application`;

const body =
`Hello ${app.realname},

After careful review of your application, we have ${app.status.toLowerCase()} it.

Thank you for applying to Voided Studios.

- Voided Studios Recruitment Team`;

window.location.href =
`mailto:${app.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* STATUS */
async function setStatus(i,status){

apps[i].status = status;
await updateDoc(doc(db,"applications",apps[i].id),{status});

sendEmail(apps[i]);

}

/* RENDER */
function render(){

if(!loggedIn){
appsDiv.innerHTML = "<p class='small'>Admin locked</p>";
return;
}

appsDiv.innerHTML = apps.map((a,i)=>`
<div class="app">
<div><b>${a.roblox}</b> (${a.realname})</div>
<div>Role: ${a.role}</div>
<div>Status: ${a.status}</div>

<button onclick="setStatus(${i},'accepted')">Accept</button>
<button onclick="setStatus(${i},'declined')">Decline</button>
</div>
`).join("");
}

/* GLOBAL FIX */
window.login = login;
window.setStatus = setStatus;
window.submitApp = submitApp;

</script>

</body>
</html>
