<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voided Studios Application Portal</title>

<style>
body{
margin:0;
font-family:monospace;
background:#0b0b10;
color:white;
}

header{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

.container{
display:flex;
justify-content:center;
padding:30px;
}

.card{
width:560px;
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
background:#050507;
border:1px solid #333;
color:white;
border-radius:6px;
font-family:monospace;
}

textarea{
height:120px;
resize:none;
}

button{
background:#7c3aed;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h2>VOIDED STUDIOS APPLICATION PORTAL</h2>
</header>

<div class="container">

<div class="card">

<input id="roblox" placeholder="Roblox Username">
<input id="realname" placeholder="Real Name">
<input id="discord" placeholder="Discord Username">
<input id="xname" placeholder="X Username (Twitter)">
<input id="email" placeholder="Email Address">

<select id="role">

<!-- CORE ENGINEERING -->
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
<option>Software Engineer</option>
<option>Game Developer</option>
<option>Gameplay Programmer</option>
<option>Systems Programmer</option>
<option>Tools Programmer</option>
<option>Engine Programmer</option>
<option>Graphics Programmer</option>
<option>AI Engineer</option>
<option>Machine Learning Engineer</option>
<option>DevOps Engineer</option>
<option>Site Reliability Engineer</option>
<option>Cloud Engineer</option>
<option>Infrastructure Engineer</option>
<option>Security Engineer</option>
<option>Network Engineer</option>
<option>Database Engineer</option>
<option>Performance Engineer</option>
<option>Automation Engineer</option>

<!-- ROBLOX DEV -->
<option>Roblox Scripter</option>
<option>Roblox Gameplay Developer</option>
<option>Roblox Systems Engineer</option>
<option>Roblox UI Engineer</option>

<!-- UI / UX -->
<option>UI Developer</option>
<option>UX Engineer</option>
<option>UI/UX Designer</option>

<!-- ART -->
<option>3D Modeler</option>
<option>Animator</option>
<option>VFX Artist</option>
<option>Concept Artist</option>

<!-- DESIGN -->
<option>Game Designer</option>
<option>Level Designer</option>

<!-- AUDIO -->
<option>Sound Designer</option>
<option>Music Composer</option>

<!-- QA / COMMUNITY -->
<option>QA Tester</option>
<option>Community Manager</option>

<!-- STAFF / MODERATION -->
<option>Staff Member</option>
<option>Junior Moderator</option>
<option>Moderator</option>
<option>Senior Moderator</option>
<option>Head Moderator</option>

<!-- ADMINISTRATION -->
<option>Administrator</option>
<option>Senior Administrator</option>
<option>Head Administrator</option>

<!-- MANAGEMENT -->
<option>Manager</option>
<option>Operations Manager</option>
<option>Project Manager</option>

<!-- LEADERSHIP -->
<option>Development Director</option>
<option>Executive Development Director</option>

</select>

<textarea id="reason" placeholder="Why do you want to join Voided Studios?"></textarea>
<textarea id="extra" placeholder="What can you bring to the team?"></textarea>

<button onclick="submitApp()">Submit Application</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCic_ne2ZWsYZeTFX-2fJPCcFXJlqzLEW4",
authDomain: "voided-studios-apply-portal.firebaseapp.com",
projectId: "voided-studios-apply-portal",
storageBucket: "voided-studios-apply-portal.firebasestorage.app",
messagingSenderId: "385790292991",
appId: "1:385790292991:web:a4a10cb5781c107151adca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"applications");

/* SUBMIT */
window.submitApp = async function(){

await addDoc(colRef,{
roblox: roblox.value || "N/A",
realname: realname.value || "N/A",
discord: discord.value || "N/A",
x: xname.value || "N/A",
email: email.value || "N/A",
role: role.value || "N/A",
reason: reason.value || "N/A",
extra: extra.value || "N/A",
status: "Pending",
time: new Date().toLocaleString()
});

alert("Application Sent!");
};

</script>

</body>
</html>
