<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCic_ne2ZWsYZeTFX-2fJPCcFXJlqzLEW4",
authDomain: "voided-studios-apply-portal.firebaseapp.com",
projectId: "voided-studios-apply-portal",
storageBucket: "voided-studios-apply-portal.firebasestorage.app",
messagingSenderId: "385790292991",
appId: "1:385790292991:web:a4a10cb5781c107151adca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "applications");

const PASSWORD = "VoidedStudios.Agent";
let loggedIn = false;
let apps = [];

const appsDiv = document.getElementById("apps");

/* LIVE DATA */
onSnapshot(colRef, (snap)=>{
apps = snap.docs.map(d => ({id:d.id, ...d.data()}));
render();
});

/* AI BACKEND */
async function getAITag(data){
try{
const res = await fetch("https://voided-studios-apply-portal.onrender.com/analyze", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
return await res.json();
}catch{
return {tag:"Needs Review", score:5};
}
}

/* SUBMIT */
async function submitApp(){

const data = {
roblox: roblox.value,
realname: realname.value,
discord: discord.value,
x: xname.value,
email: email.value,
role: role.value,
reason: reason.value,
extra: extra.value,
time: new Date().toLocaleString(),
status:"Pending"
};

if(!data.roblox || !data.email || !data.reason){
alert("Fill required fields");
return;
}

const ai = await getAITag(data);
data.aiTag = ai.tag;
data.aiScore = ai.score;

await addDoc(colRef,data);

alert("Application submitted!");
}

/* LOGIN */
function login(){
if(pass.value === PASSWORD){
loggedIn = true;
render();
}else{
alert("Incorrect password");
}
}

/* FIXED EMAIL (THIS IS THE IMPORTANT PART) */
function sendEmail(appData, status){

const subject = `Voided Studios Application - ${status}`;

const body =
`Hello ${appData.realname},

After reviewing your application, we have ${status.toUpperCase()} it.

Role: ${appData.role}

Thank you!
- Voided Studios Team`;

/* IMPORTANT: direct user action trigger */
window.location.href =
`mailto:${appData.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* STATUS CHANGE (FIXED EMAIL TRIGGER) */
async function setStatus(i, status){

const a = apps[i];

await updateDoc(doc(db,"applications",a.id), {status});

/* delay prevents browser blocking mailto */
setTimeout(()=>{
sendEmail(a,status);
},50);

}

/* RENDER */
function render(){

if(!loggedIn){
appsDiv.innerHTML = "<p class='small'>Admin locked</p>";
return;
}

appsDiv.innerHTML = apps.map((a,i)=>`
<div class="app">
<div><b>${a.roblox}</b> (${a.realname})</div>
<div>Role: ${a.role}</div>
<div class="small">AI: ${a.aiTag} (${a.aiScore})</div>
<div>Status: ${a.status}</div>

<button onclick="setStatus(${i},'accepted')">Accept</button>
<button onclick="setStatus(${i},'declined')">Decline</button>
</div>
`).join("");
}

window.submitApp = submitApp;
window.login = login;
window.setStatus = setStatus;

</script>
